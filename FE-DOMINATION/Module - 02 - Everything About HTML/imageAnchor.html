<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image and Anchor</title>
</head>
<body>
    
    <!-- Anchor Tag -->
    <a href="https://www.google.com">Google</a>
    <a href="https://www.google.com" target="_blank">Google</a>

    <!-- Image Tag -->
    <img
      src="https://plus.unsplash.com/premium_photo-1672582776474-fc85ebaa1b73?q=80&w=1374&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
      alt=" Image"
      height="400px"
    />
    <hr />
    <br />
     <!-- Anchor Tag : For add HyperLink - text, images, pages and links as well as Files -->

    <!-- Absolute Link -->

    <a
      href="https://github.com/WebXWizard"
      target="_blank"
      title="GitHub Profile"
    >
      WebXWizard
    </a>

    <br />
    <br />

    <!-- Relative Link -->

    <a href="/Week - 02/lists.html" target="_blank"> Go to List </a>

    <br />
    <br />
    <br />

    
    <!-- Image tag <img> - Used to add images to your images -->

    <!-- Absolute Path.... -->

    <img
      src="https://camo.githubusercontent.com/5119ee303e5e49cdf23def653b737bede0da49a859a34714d62d9ab518afbbb2/68747470733a2f2f63646e2e6472696262626c652e636f6d2f75736572732f313136323037372f73637265656e73686f74732f333834383931342f70726f6772616d6d65722e676966"
      height="250"
      alt="Developer Image"
    />

    <br />
    <br />
    <br />

    <!-- Relative Path.... -->

    <img src="/Week - 02/My Photo.jpg" width="200" alt="....." />
    <br />
    <hr />
</body>
</html>
