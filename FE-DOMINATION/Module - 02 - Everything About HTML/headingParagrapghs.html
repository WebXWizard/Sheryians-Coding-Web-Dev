<!DOCTYPE html>
<!-- This is a simple HTML document structure -->
<html lang="en">
  <!-- The lang attribute specifies the language of the document -->

  <head>
    <!-- The head element contains meta-information about the document -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Headings and Paragraph</title>
    <!-- The title element specifies the title of the document, which is displayed in the browser's title bar or tab -->
  </head>

  <!-- <opening tag> Content </closing tag> -->

  <!-- The body element contains the content of the document -->
  <body>
    <!-- The body element contains the content of the document -->

    <!-- Headings (Head Tags) -->
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>

    <!-- Paragraph Tag -->
    Lorem ipsum dolor sit amet consectetur.

    <p>This is a simple HTML document.</p>

    <!-- Ctrl+D = 2times Right Cursor and Backspace and used -->

    <h1>Hello</h1>
    <h2>Hello</h2>
    <h3>Hello</h3>
    <h4>Hello</h4>
    <h5>Hello</h5>
    <h6>Hello</h6>
  </body>
</html>
